proxy-groups:
  - name: hand-proxy
    type: select
    include-all: true
    proxies:
      - DIRECT

rules:
  - DOMAIN-KEYWORD,openai,hand-proxy
  - DOMAIN-KEYWORD,chatgpt,hand-proxy
  - DOMAIN-KEYWORD,codex,hand-proxy
  - DOMAIN,api.jetbrains.ai,hand-proxy
  - DOMAIN-KEYWORD,jetbrains,hand-proxy
  - GEOIP,CN,DIRECT
  - MATCH,DIRECT